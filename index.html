<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ㅤ</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            margin: 0;
            font-family: Verdana, sans-serif;
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .start-screen {
            font-family: Corbel, sans-serif;
            font-size: 1.5rem;
            cursor: pointer;
            animation: fade-in 1s;
            position: absolute;
            color: #fff;
        }

        .profiles {
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
            animation: fade-in 1s;
            position: absolute;
        }

        .profile-card {
            background-color: transparent;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            width: 200px;
        }

        .profile-card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .nickname {
            font-family: Consolas, monospace;
        }

        .nickname.primary {
            font-size: 1.2rem;
        }

        .nickname.secondary {
            font-size: 1rem;
            color: #aaa;
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fade-out {
            from { opacity: 1; }
            to { opacity: 0; }
        }
    </style>
</head>
<body onclick="enterSite()">
    <div class="start-screen">.gg/GDjg796Xbp</div>

    <div class="profiles">
        <div class="profile-card">
            <img src="https://ibb.co/g7SzNSK" alt="Profile 1">
            <div class="nickname primary">niel</div>
            <div class="nickname secondary">530x</div>
        </div>
        <div class="profile-card">
            <img src="https://ibb.co/9vND2XZ" alt="Profile 2">
            <div class="nickname primary">farewell, my heart</div>
            <div class="nickname secondary">695y</div>
        </div>
        <div class="profile-card">
            <img src="https://ibb.co/d0Vqs8y" alt="Profile 3">
            <div class="nickname primary">m0ngler</div>
            <div class="nickname secondary">301y</div>
        </div>
        <div class="profile-card">
            <img src="https://ibb.co/8PXwGGT" alt="Profile 4">
            <div class="nickname primary">y71l</div>
            <div class="nickname secondary">3ye6yyyy</div>
        </div>
    </div>

    <script>
        let audioPlayed = false;

        function enterSite() {
            const startScreen = document.querySelector('.start-screen');
            const profiles = document.querySelector('.profiles');

            startScreen.style.animation = 'fade-out 1s';

            if (!audioPlayed) {
                const audio = new Audio('media/song.mp3');
                audio.play();
                audioPlayed = true;
            }

            setTimeout(() => {
                startScreen.style.display = 'none';
                profiles.style.display = 'flex';
            }, 1000);
        }
    </script>
</body>
</html>
