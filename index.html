    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Remove barras de rolagem */
        }

        body {
            max-width: 100%; /* Garante que o layout não exceda a largura da tela */
            height: 100vh; /* Preenche a altura da tela */
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centraliza o conteúdo */
            justify-content: center; /* Centraliza verticalmente */
            position: relative;
        }

        video {
            object-fit: cover; /* Faz o vídeo preencher o espaço disponível */
            width: 100vw; /* Adapta a largura ao viewport */
            height: 100vh; /* Adapta a altura ao viewport */
            position: absolute; /* Permite que o vídeo ocupe toda a tela */
            top: 0;
            left: 0;
            z-index: -1; /* Mantém o vídeo de fundo */
        }

        .discord-profile {
            width: 90%; /* Reduz a largura para caber em telas menores */
            max-width: 800px; /* Limita a largura máxima */
            margin: 10px auto; /* Espaçamento entre perfis */
            overflow: hidden;
            text-align: center;
        }

        .pfp img {
            width: 80px; /* Ajusta o tamanho das imagens */
            height: 80px;
            border-radius: 50%; /* Deixa a imagem circular */
        }

        .overlay {
            width: 100%;
            text-align: center;
            position: absolute;
            bottom: 10px;
        }

        /* Responsividade para telas menores */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .discord-profile {
                width: 95%;
            }

            .pfp img {
                width: 60px;
                height: 60px;
            }
        }
    </style>
</head>
