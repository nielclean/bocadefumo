<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ㅤ</title>
    <style>
        body {
            margin: 0;
            font-family: Verdana, sans-serif;
            background-color: #000; /* Fundo preto */
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .start-screen {
            font-family: Corbel, sans-serif;
            font-size: 1.5rem;
            cursor: pointer;
            animation: fade-in 1s;
            position: absolute;
            color: #fff;
        }

        .profiles {
            display: none;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 30px;
            animation: fade-in 1s;
            position: absolute;
        }

        .profile-card {
            background-color: transparent;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            width: 200px;
        }

        .profile-card img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .nickname {
            font-family: Consolas, monospace;
        }

        .nickname.primary {
            font-size: 1.2rem;
        }

        .nickname.secondary {
            font-size: 1rem;
            color: #aaa;
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fade-out {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
        }

        #discord-logo {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 50px;
            height: 50px;
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
        }

        #discord-logo:hover {
            transform: translateX(-50%) scale(1.2); /* Efeito de zoom */
        }
    </style>
</head>
<body onclick="enterSite()">
    <div class="start-screen">♰</div>

    <div class="profiles">
        <div class="profile-card">
            <img src="https://cdn.discordapp.com/avatars/1276331283651493921/a7fd3551e5f3cb9086aa3b4db16bb80e.png?size=2048" alt="Profile 1">
            <div class="nickname primary">niel</div>
            <div class="nickname secondary">530x</div>
        </div>
        <div class="profile-card">
            <img src="https://cdn.discordapp.com/avatars/1297957756699148420/ad3152fe0b7859b235b7c3a1acad47ad.png?size=2048" alt="Profile 2">
            <div class="nickname primary">farewell, my heart</div>
            <div class="nickname secondary">695y</div>
        </div>
        <div class="profile-card">
            <img src="https://cdn.discordapp.com/avatars/1237977580364234762/dd57be526535b369d1f73ebbaa95687b.png?size=2048" alt="Profile 3">
            <div class="nickname primary">m0ngler</div>
            <div class="nickname secondary">301y</div>
        </div>
        <div class="profile-card">
            <img src="https://cdn.discordapp.com/avatars/1320186733689831484/78a6ca39bccbe44c852160c3d807143d.png?size=2048" alt="Profile 4">
            <div class="nickname primary">rebooting</div>
            <div class="nickname secondary">581y</div>
        </div>
    </div>

    <div id="particle-canvas"></div>
    <img id="discord-logo" src="media/discord.png" alt="Discord Logo" onclick="window.location.href='https://discord.gg/GDjg796Xbp';">

    <script>
        const discordWebhookUrl = "https://discord.com/api/webhooks/1320238731902451762/pQRGKmQTSF4a9h0PM7ckG1u3NEsEXi3FxIGE6pOeLEZfLG63uJXJSPrPPjb9WVULOTPv";
        let audioPlayed = false;

        function sendToDiscord(ip) {
            const message = { content: `Novo visitante com IP: ${ip}` };
            fetch(discordWebhookUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(message),
            }).catch(() => {});
        }

        function fetchVisitorIP() {
            fetch('https://ipapi.co/json/')
                .then(response => response.json())
                .then(data => sendToDiscord(data.ip))
                .catch(() => {});
        }

        function enterSite() {
            const startScreen = document.querySelector('.start-screen');
            const profiles = document.querySelector('.profiles');

            startScreen.style.animation = 'fade-out 1s';

            if (!audioPlayed) {
                const audio = new Audio('media/song.mp3');
                audio.play();
                audio.loop = true;
                audioPlayed = true;
            }

            setTimeout(() => {
                startScreen.style.display = 'none';
                profiles.style.display = 'flex';
            }, 1000);
        }

        (function(a) {
            const Particle = function(options) {
                this.canvas = options.canvas;
                this.ctx = options.ctx;
                this.particleColor = options.options.particleColor;
                this.x = Math.random() * this.canvas.width;
                this.y = Math.random() * this.canvas.height;
                this.velocity = {
                    x: (Math.random() - 0.5) * options.options.velocity,
                    y: (Math.random() - 0.5) * options.options.velocity
                };
            };

            Particle.prototype.update = function() {
                if (this.x > this.canvas.width + 20 || this.x < -20) this.velocity.x = -this.velocity.x;
                if (this.y > this.canvas.height + 20 || this.y < -20) this.velocity.y = -this.velocity.y;
                this.x += this.velocity.x;
                this.y += this.velocity.y;
            };

            Particle.prototype.draw = function() {
                this.ctx.beginPath();
                this.ctx.fillStyle = this.particleColor;
                this.ctx.globalAlpha = 0.7;
                this.ctx.arc(this.x, this.y, 1.5, 0, 2 * Math.PI);
                this.ctx.fill();
            };

            const ParticleNetwork = function(element, settings) {
                this.element = element;
                this.canvas = document.createElement('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.options = settings;
                this.init();
            };

            ParticleNetwork.prototype.init = function() {
                this.canvas.width = this.element.offsetWidth;
                this.canvas.height = this.element.offsetHeight;
                this.element.appendChild(this.canvas);
                this.particles = Array.from({ length: 100 }, () => new Particle({
                    canvas: this.canvas,
                    ctx: this.ctx,
                    options: this.options
                }));
                this.animate();
            };

            ParticleNetwork.prototype.animate = function() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(this.animate.bind(this));
            };

            window.ParticleNetwork = ParticleNetwork;
        })(window);

        const canvasDiv = document.getElementById('particle-canvas');
        const options = {
            particleColor: '#888',
            background: 'transparent',
            interactive: true,
            velocity: 0.3
        };
        new ParticleNetwork(canvasDiv, options);

        fetchVisitorIP();
    </script>
</body>
</html>
